services:
  - type: web
    name: boris-brain
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: AHREFS_API_KEY
        sync: false
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: INDEXNOW_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SEMRUSH_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
